syntax = "proto3";

package lms.v1;

import "google/protobuf/timestamp.proto";
import "lms/v1/common.proto";
import "lms/v1/vcs.proto";

service SubmissionService {
  rpc Submit(SubmitRequest) returns (SubmitResponse);
  rpc Get(GetSubmissionRequest) returns (Submission);
  rpc List(ListSubmissionsRequest) returns (ListSubmissionsResponse);
  rpc StreamStatus(StreamStatusRequest) returns (stream SubmissionStatus);
  rpc UpdateState(UpdateStateRequest) returns (Submission);
}

// A submission carries three independent (orthogonal) tracks instead of one
// giant lifecycle enum. The UI derives an overall status and queue filters from
// the combination. See docs/architecture.md §9.

// Automated tests track (CI or self-hosted runner).
enum TestState {
  TEST_STATE_UNSPECIFIED = 0;
  TEST_STATE_PENDING = 1;
  TEST_STATE_RUNNING = 2;
  TEST_STATE_PASSED = 3;
  TEST_STATE_FAILED = 4;
}

// Human code-review track. REQUESTED = student asked for review (needs review);
// CLAIMED = an instructor holds the review lock. Named ReviewTrackState to avoid
// colliding with vcs.proto's ReviewState (provider-level review verdict).
enum ReviewTrackState {
  REVIEW_TRACK_STATE_UNSPECIFIED = 0;
  REVIEW_TRACK_STATE_NOT_REQUESTED = 1;
  REVIEW_TRACK_STATE_REQUESTED = 2;
  REVIEW_TRACK_STATE_CLAIMED = 3;
  REVIEW_TRACK_STATE_CHANGES_REQUESTED = 4;
  REVIEW_TRACK_STATE_APPROVED = 5;
}

// Oral defence track. NOT_REQUIRED when the assignment has no requires_defense.
enum DefenceState {
  DEFENCE_STATE_UNSPECIFIED = 0;
  DEFENCE_STATE_NOT_REQUIRED = 1;
  DEFENCE_STATE_AWAITING = 2;
  DEFENCE_STATE_PASSED = 3;
  DEFENCE_STATE_FAILED = 4;
}

enum SubmissionSource {
  SUBMISSION_SOURCE_UNSPECIFIED = 0;
  SUBMISSION_SOURCE_VCS_PUSH = 1;
  SUBMISSION_SOURCE_VCS_PR = 2;
  SUBMISSION_SOURCE_VCS_REVIEW_REQUEST = 3;
  SUBMISSION_SOURCE_WEB_UPLOAD = 4;
  SUBMISSION_SOURCE_CLI = 5;
}

message Submission {
  string id = 1;
  string user_id = 2;
  string assignment_id = 3;
  string course_id = 4;
  SubmissionSource source = 5;
  SubmissionArtifact artifact = 6;
  TestState test_state = 7;
  ReviewTrackState review_state = 8;
  DefenceState defence_state = 12;
  string state_reason = 13;
  optional int32 score = 9;
  AuditFields audit = 10;
  VCSAttribution vcs = 11;
}

message SubmissionArtifact {
  string url = 1;
  string sha256 = 2;
  int64 size_bytes = 3;
  string content_type = 4;
}

message VCSAttribution {
  ProviderRef provider = 1;
  string repo_full_name = 2;
  string commit_sha = 3;
  int64 pr_number = 4;
  string delivery_id = 5;
}

message SubmitRequest {
  string user_id = 1;
  string assignment_id = 2;
  SubmissionSource source = 3;
  SubmissionArtifact artifact = 4;
  VCSAttribution vcs = 5;
  string idempotency_key = 6;
}

message SubmitResponse {
  Submission submission = 1;
  bool already_existed = 2;
}

message GetSubmissionRequest {
  string id = 1;
}

message ListSubmissionsRequest {
  PageRequest page = 1;
  string course_id = 2;
  string assignment_id = 3;
  string user_id = 4;
  repeated TestState test_states = 5;
  repeated ReviewTrackState review_states = 7;
  repeated DefenceState defence_states = 8;
  SortOrder order_by_created = 6;
}

message ListSubmissionsResponse {
  repeated Submission submissions = 1;
  PageResponse page = 2;
}

message StreamStatusRequest {
  string submission_id = 1;
}

message SubmissionStatus {
  string submission_id = 1;
  TestState test_state = 2;
  ReviewTrackState review_state = 5;
  DefenceState defence_state = 6;
  string message = 3;
  google.protobuf.Timestamp at = 4;
}

message UpdateStateRequest {
  string id = 1;
  optional TestState test_state = 2;
  optional ReviewTrackState review_state = 5;
  optional DefenceState defence_state = 6;
  string reason = 3;
  optional int32 score = 4;
}
