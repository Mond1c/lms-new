services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms -d postgres"]
      interval: 2s
      timeout: 2s
      retries: 30

  redpanda:
    image: redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,EXTERNAL://localhost:9092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "9092:9092"   # external kafka
      - "9644:9644"   # admin API (metrics, topic mgmt)
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"   # s3 API
      - "9001:9001"   # console UI
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 30

  jaeger:
    # All-in-one. Accepts OTLP on 4317/grpc, UI on 16686.
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP grpc

  # ---- LMS services ----
  # Each service has its own DB on the shared Postgres instance.
  # init-db.sql creates them on first boot.

  identity:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: identity
    environment:
      IDENTITY_HTTP_ADDR: ":8081"
      IDENTITY_DATABASE_URL: "postgres://lms:lms@postgres:5432/lms_identity?sslmode=disable"
      OTLP_ENDPOINT: "jaeger:4317"
      LOG_LEVEL: "info"
      LOG_FORMAT: "json"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/readyz || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 30

  submission:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: submission
    environment:
      SUBMISSION_HTTP_ADDR: ":8082"
      SUBMISSION_DATABASE_URL: "postgres://lms:lms@postgres:5432/lms_submission?sslmode=disable"
      OTLP_ENDPOINT: "jaeger:4317"
      LOG_LEVEL: "info"
      LOG_FORMAT: "json"
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/readyz || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 30

  grading:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: grading
    environment:
      GRADING_HTTP_ADDR: ":8083"
      GRADING_DATABASE_URL: "postgres://lms:lms@postgres:5432/lms_grading?sslmode=disable"
      OTLP_ENDPOINT: "jaeger:4317"
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/readyz || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 30

  vcs:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: vcs
    environment:
      VCS_HTTP_ADDR: ":8084"
      VCS_DATABASE_URL: "postgres://lms:lms@postgres:5432/lms_vcs?sslmode=disable"
      OTLP_ENDPOINT: "jaeger:4317"
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/readyz || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 30

  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: gateway
    environment:
      GATEWAY_HTTP_ADDR: ":8080"
      GATEWAY_DATABASE_URL: "postgres://lms:lms@postgres:5432/lms_gateway?sslmode=disable"
      OTLP_ENDPOINT: "jaeger:4317"
    ports:
      - "8080:8080"
    depends_on:
      identity:
        condition: service_healthy
      submission:
        condition: service_healthy
      grading:
        condition: service_healthy
      vcs:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/readyz || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 30

volumes:
  postgres-data:
  minio-data:
