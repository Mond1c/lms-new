syntax = "proto3";

package lms.v1;

import "google/protobuf/timestamp.proto";
import "lms/v1/common.proto";
import "lms/v1/identity.proto";
import "lms/v1/submission.proto";
import "lms/v1/grading.proto";
import "lms/v1/vcs.proto";

service GatewayService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc Whoami(WhoamiRequest) returns (WhoamiResponse);

  // Student-facing aggregations.
  rpc MyDashboard(MyDashboardRequest) returns (MyDashboardResponse);
  rpc MySubmission(MySubmissionRequest) returns (MySubmissionResponse);

  rpc ResolveSubmission(ResolveSubmissionRequest) returns (ResolveSubmissionResponse);

  rpc SubmitFromWeb(SubmitFromWebRequest) returns (SubmitResponse);

  // Instructor-facing aggregations (review queue, claiming, grading).
  // The acting reviewer/examiner is taken from the auth context, not the request.
  rpc ListCourseSubmissions(ListCourseSubmissionsRequest) returns (ListCourseSubmissionsResponse);
  rpc ClaimSubmission(ClaimSubmissionRequest) returns (ClaimSubmissionResponse);
  rpc ReleaseClaim(ReleaseClaimRequest) returns (ReleaseClaimResponse);
  rpc SubmitReview(WebSubmitReviewRequest) returns (Review);
  rpc OverrideTestScore(WebOverrideTestScoreRequest) returns (FinalGrade);
  rpc RecordDefence(WebRecordDefenceRequest) returns (Defence);
  rpc CourseGradeOverview(CourseGradeOverviewRequest) returns (CourseGradeOverviewResponse);
}


message LoginRequest {
  oneof credential {
    VCSOAuthCode vcs_code = 1;
    EmailPassword email_password = 2;
  }
}

message VCSOAuthCode {
  ProviderRef provider = 1;
  string code = 2;
  string redirect_uri = 3;
}

message EmailPassword {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in_seconds = 3;
  string user_id = 4;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  int64 expires_in_seconds = 2;
}

message WhoamiRequest {}

message WhoamiResponse {
  string user_id = 1;
  string display_name = 2;
  string email = 3;
  repeated CourseMembership memberships = 4;
}

message CourseMembership {
  string course_id = 1;
  string course_code = 2;
  string course_title = 3;
  Role role = 4;
}

message MyDashboardRequest {}

message MyDashboardResponse {
  repeated AssignmentCard assignments = 1;
}

message AssignmentCard {
  string assignment_id = 1;
  string course_code = 2;
  string assignment_title = 3;
  string slug = 4;
  google.protobuf.Timestamp deadline = 5;
  google.protobuf.Timestamp hard_deadline = 6;
  TestState latest_test_state = 7;
  ReviewTrackState latest_review_state = 11;
  DefenceState latest_defence_state = 12;
  optional int32 latest_score = 8;
  int32 max_score = 9;
  int32 attempt_count = 10;
}

message MySubmissionRequest {
  string submission_id = 1;
}

message MySubmissionResponse {
  Submission submission = 1;
  GradingResult result = 2;
}

message SubmitFromWebRequest {
  string assignment_id = 1;
  SubmissionArtifact artifact = 2;
  string idempotency_key = 3;
}

message ResolveSubmissionRequest {
  string repo_full_name = 1;
  string commit_sha = 2;
}

message ResolveSubmissionResponse {
  string submission_id = 1;
  string user_id = 2;
  string assignment_id = 3;
  string course_id = 4;
}

// --- Instructor BFF: review queue, claiming, grading ----------------------

message ListCourseSubmissionsRequest {
  string course_id = 1;
  string assignment_id = 2;
  string student_id = 3;
  ReviewQueueFilter filter = 4;
  string claimed_by = 5;
  PageRequest page = 6;
}

message ListCourseSubmissionsResponse {
  repeated CourseSubmissionCard items = 1;
  PageResponse page = 2;
}

message CourseSubmissionCard {
  string submission_id = 1;
  string user_id = 2;
  string student_display_name = 3;
  string assignment_id = 4;
  string assignment_title = 5;
  TestState test_state = 6;
  ReviewTrackState review_state = 7;
  DefenceState defence_state = 8;
  ReviewClaim claim = 9;
  string pr_url = 10;
  optional int32 final_points = 11;
  google.protobuf.Timestamp requested_at = 12;
}

message ClaimSubmissionRequest {
  string submission_id = 1;
}

message ClaimSubmissionResponse {
  ReviewClaim claim = 1;
}

message ReleaseClaimRequest {
  string submission_id = 1;
}

message ReleaseClaimResponse {}

message WebSubmitReviewRequest {
  string submission_id = 1;
  double quality = 2;
  optional double test_override = 3;
  ReviewOutcome outcome = 4;
  string comment_markdown = 5;
}

message WebOverrideTestScoreRequest {
  string submission_id = 1;
  double tests = 2;
  string reason = 3;
}

message WebRecordDefenceRequest {
  string submission_id = 1;
  double score = 2;
  string notes = 3;
}

message CourseGradeOverviewRequest {
  string course_id = 1;
  string assignment_id = 2;
  PageRequest page = 3;
}

message CourseGradeOverviewResponse {
  repeated StudentGradeRow rows = 1;
  PageResponse page = 2;
}

message StudentGradeRow {
  string user_id = 1;
  string display_name = 2;
  repeated AssignmentGradeCell cells = 3;
}

message AssignmentGradeCell {
  string assignment_id = 1;
  optional double final_normalized = 2;
  optional int32 final_points = 3;
  int32 max_score = 4;
}
